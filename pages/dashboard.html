<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Patient Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <!-- Protect page visually before JS redirect -->
    <style> body { display: none; } </style>
    <script>
        // check_auth.php to protect pages/APIs
        fetch('../api/check_auth.php')
            .then(res => {
                if(!res.ok) throw new Error('Unauthorized');
                return res.json();
            })
            .then(data => {
                if (data.status === 'success') {
                    document.body.style.display = 'block'; // Show page
                    document.getElementById('logged-in-user').textContent = data.user.username;
                    loadPatients();
                } else {
                    window.location.replace('login.html');
                }
            })
            .catch(() => {
                window.location.replace('login.html');
            });
    </script>
</head>
<body>
    <div class="blob-container">
        <div class="blob blob-1" style="background-color: #5D7052; opacity: 0.2; width: 40vw; top: 10%; left: 70%;"></div>
        <div class="blob blob-2" style="background-color: #C18C5D; opacity: 0.15; top: 60%;"></div>
    </div>

    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="nav-brand">
                <div class="nav-logo">H</div>
                <span>Patient Records</span>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span style="font-size: 0.9rem; color: var(--muted-foreground)">Welcome, <strong id="logged-in-user">Provider</strong></span>
                <button id="logout-btn" class="btn btn-ghost" style="height: 2.5rem; padding: 0 1.5rem; border: 1px solid var(--border-color);">
                    Logout
                </button>
            </div>
        </nav>

        <div class="dashboard-grid">
            <!-- Sidebar: Add Patient Form -->
            <div class="sidebar">
                <div class="organic-card" style="padding: 2rem;">
                    <h2 style="font-size: 1.5rem; margin-bottom: 2rem;">New Patient</h2>
                    
                    <div id="form-alert" class="error-message" style="background-color: rgba(93,112,82,0.1); color: var(--primary); border-color: rgba(93,112,82,0.2);"></div>

                    <form id="add-patient-form">
                        <div class="form-group">
                            <label class="form-label" for="name">Patient Name</label>
                            <input type="text" id="name" name="name" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="age">Age</label>
                            <input type="number" id="age" name="age" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="disease">Disease / Condition</label>
                            <input type="text" id="disease" name="disease" class="form-input" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="status">Status</label>
                            <select id="status" name="status" class="form-input form-select" required>
                                <option value="admitted">Admitted</option>
                                <option value="discharged">Discharged</option>
                            </select>
                        </div>
                        
                        <div class="form-group" style="margin-top: 1.5rem;">
                            <button type="submit" class="btn btn-primary btn-full">Save Record</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Main: Patient List -->
            <div class="main-content">
                <h2 style="font-size: 2rem; margin-bottom: 2rem;">Current Roster</h2>
                <div class="patient-list" id="patient-list">
                    <!-- Cards will be populated by JS -->
                    <p style="color: var(--muted-foreground)">Loading patient data...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fetch and display patients
        async function loadPatients() {
            try {
                const res = await fetch('../api/get_patients.php');
                const result = await res.json();
                
                const listContainer = document.getElementById('patient-list');
                listContainer.innerHTML = '';

                if (result.status === 'success' && result.data.length > 0) {
                    result.data.forEach(patient => {
                        const card = document.createElement('div');
                        card.className = 'patient-card';
                        
                        const statusClass = patient.status === 'admitted' ? 'status-admitted' : 'status-discharged';
                        
                        card.innerHTML = `
                            <div class="patient-header">
                                <h3 class="patient-name">${patient.name}</h3>
                                <span class="status-badge ${statusClass}">${patient.status}</span>
                            </div>
                            <div class="patient-detail">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                Age: ${patient.age}
                            </div>
                            <div class="patient-detail">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                                Condition: <strong style="color: var(--foreground); margin-left:4px;">${patient.disease}</strong>
                            </div>
                        `;
                        listContainer.appendChild(card);
                    });
                } else if (result.status === 'success') {
                    listContainer.innerHTML = '<p style="color: var(--muted-foreground)">No patients found. Add a patient to get started.</p>';
                }
            } catch (error) {
                console.error("Error loading patients:", error);
                document.getElementById('patient-list').innerHTML = '<p class="error-message" style="display:block">Failed to load patient data.</p>';
            }
        }

        // Add Patient
        document.getElementById('add-patient-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const alertBox = document.getElementById('form-alert');
            const submitBtn = form.querySelector('button[type="submit"]');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';

            try {
                const res = await fetch('../api/add_patient.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                
                alertBox.style.display = 'block';
                if (result.status === 'success') {
                    alertBox.style.color = 'var(--primary)';
                    alertBox.style.backgroundColor = 'rgba(93,112,82,0.1)';
                    alertBox.style.borderColor = 'rgba(93,112,82,0.2)';
                    alertBox.textContent = 'Patient added successfully!';
                    form.reset();
                    loadPatients(); // refresh list
                    
                    // hide alert after 3 seconds
                    setTimeout(() => alertBox.style.display = 'none', 3000);
                } else {
                    alertBox.style.color = 'var(--destructive)';
                    alertBox.style.backgroundColor = 'rgba(168,84,72,0.1)';
                    alertBox.style.borderColor = 'rgba(168,84,72,0.2)';
                    alertBox.textContent = result.message || 'Error adding patient.';
                }
            } catch (error) {
                alertBox.style.display = 'block';
                alertBox.style.color = 'var(--destructive)';
                alertBox.textContent = 'Connection error.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save Record';
            }
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                const res = await fetch('../api/logout.php');
                const data = await res.json();
                if (data.status === 'success') {
                    window.location.replace('login.html');
                }
            } catch (error) {
                console.error("Logout failed:", error);
            }
        });
    </script>
</body>
</html>
